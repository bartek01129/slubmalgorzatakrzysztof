services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mk-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost
      - DATA_DIR=/data/photos
      - MAX_PHOTOS=1000
      - MAX_UPLOAD_MB=15
      - ADMIN_TOKEN=devtoken
    volumes:
      - ./backend/data:/data/photos
    expose:
      - '3001'
    networks:
      - wedding-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mk-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - wedding-net

networks:
  wedding-net:
    driver: bridge
