services:
  backend:
    image: ${DOCKER_USERNAME}/bartek:slubmalgorzatakrzysztof-backend
    container_name: slubmalgorzatakrzysztof-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - FRONTEND_URL=https://malgorzataikrzysztof.naszwielkidzien.pl
      - DATA_DIR=/data/photos
      - MAX_PHOTOS=1000
      - MAX_UPLOAD_MB=15
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - ./photos-data:/data/photos
    networks:
      - web
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.mk-api.rule=Host(`malgorzataikrzysztof.naszwielkidzien.pl`) && (PathPrefix(`/api`) || PathPrefix(`/photos`))'
      - 'traefik.http.routers.mk-api.entrypoints=websecure'
      - 'traefik.http.routers.mk-api.tls.certresolver=my-resolver'
      - 'traefik.http.routers.mk-api.priority=20'
      - 'traefik.http.routers.mk-api.service=mk-api'
      - 'traefik.http.services.mk-api.loadbalancer.server.port=3001'

  frontend:
    image: ${DOCKER_USERNAME}/bartek:slubmalgorzatakrzysztof-frontend
    container_name: slubmalgorzatakrzysztof-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - web
    labels:
      - 'traefik.enable=true'

      - 'traefik.http.routers.mk.rule=Host(`malgorzataikrzysztof.naszwielkidzien.pl`)'
      - 'traefik.http.routers.mk.entrypoints=websecure'
      - 'traefik.http.routers.mk.tls=true'
      - 'traefik.http.routers.mk.tls.certresolver=my-resolver'
      - 'traefik.http.routers.mk.priority=10'
      - 'traefik.http.routers.mk.service=mk'
      - 'traefik.http.services.mk.loadbalancer.server.port=3000'

networks:
  web:
    external: true
    name: traefik_proxy_network
